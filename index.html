<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThunderFinder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-dark: #0a0a0c;
            --panel-dark: #16161a;
            --electric-yellow: #eaff00;
            --danger-red: #ff3333;
            --safe-green: #00ff66;
            --text-light: #f4f4f5;
            --text-dim: #a1a1aa;
            --border-heavy: 4px solid var(--text-light);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Scanline Overlay for aesthetic */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Main App Container for Resolution Support */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 1000px;
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-dark);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 20px;
            animation: glitchFade 0.3s ease-out forwards;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        @keyframes glitchFade {
            0% { opacity: 0; transform: scale(0.98) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Home Screen Specifics */
        #home-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* Cool Thunder Animation */
        .thunder-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            fill: var(--electric-yellow);
            filter: drop-shadow(0 0 15px var(--electric-yellow));
            animation: strike 5s infinite;
        }

        @keyframes strike {
            0%, 91%, 95%, 100% { opacity: 0.1; filter: drop-shadow(0 0 0px var(--electric-yellow)); transform: scale(1); }
            92%, 96% { opacity: 1; filter: drop-shadow(0 0 25px var(--electric-yellow)); transform: scale(1.1) rotate(-5deg); }
            93%, 97% { opacity: 1; filter: drop-shadow(0 0 15px var(--electric-yellow)); transform: scale(1.05) rotate(5deg); }
        }

        #home-screen h1 {
            font-size: 3rem;
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 3px 3px 0px var(--electric-yellow);
            color: var(--bg-dark);
            -webkit-text-stroke: 1px var(--text-light);
            letter-spacing: -2px;
        }

        .home-subtitle {
            margin-bottom: 3rem;
            color: var(--text-dim);
            font-size: 0.85rem;
            max-width: 300px;
            line-height: 1.4;
        }

        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn {
            background: transparent;
            color: var(--text-light);
            border: var(--border-heavy);
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            width: 100%;
            max-width: 300px;
            display: block;
        }

        .btn-small {
            padding: 0.5rem;
            font-size: 0.9rem;
            border-width: 2px;
        }

        .btn:active {
            background: var(--electric-yellow);
            color: var(--bg-dark);
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .btn-primary {
            background: var(--text-light);
            color: var(--bg-dark);
            box-shadow: 4px 4px 0px var(--electric-yellow);
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--text-dim);
            padding-bottom: 0.5rem;
            flex-shrink: 0;
        }

        .header-bar h2 {
            font-size: 1.5rem;
        }

        /* Video / Tracker View */
        .camera-container {
            position: relative;
            flex-grow: 1;
            border: var(--border-heavy);
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            filter: grayscale(100%) contrast(150%);
        }

        .overlay-text {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--electric-yellow);
            color: var(--bg-dark);
            padding: 2px 8px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        #status-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px #000;
            width: 100%;
            z-index: 10;
        }

        /* Flash Animation */
        @keyframes flashEffect {
            0% { background-color: white; opacity: 1; }
            100% { background-color: transparent; opacity: 0; }
        }
        .flash-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: transparent;
            pointer-events: none;
            z-index: 20;
        }
        .is-flashing {
            animation: flashEffect 0.5s ease-out;
        }

        /* Mic Visualizer */
        .mic-container {
            margin-top: 1rem;
            border: 2px solid var(--text-dim);
            padding: 10px;
            flex-shrink: 0;
        }

        .mic-bar-wrapper {
            height: 20px;
            width: 100%;
            background: var(--panel-dark);
            border: 1px solid var(--text-dim);
            position: relative;
        }

        #mic-bar {
            height: 100%;
            width: 0%;
            background: var(--electric-yellow);
            transition: width 0.1s;
        }

        #mic-threshold-line {
            position: absolute;
            top: -5px;
            bottom: -5px;
            width: 2px;
            background: var(--danger-red);
            z-index: 5;
        }

        /* Results / Warnings */
        #results-container {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--panel-dark);
            border: 2px solid var(--electric-yellow);
            display: none;
            flex-shrink: 0;
        }

        #results-container.active {
            display: block;
        }

        .warning-text {
            color: var(--danger-red);
            font-weight: bold;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* Settings */
        .setting-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .setting-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--electric-yellow);
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--electric-yellow);
        }

        .val-display {
            float: right;
            color: var(--text-light);
        }

        .brutalist-select {
            width: 100%;
            background: var(--bg-dark);
            color: var(--text-light);
            border: 2px solid var(--text-dim);
            padding: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        .brutalist-select:focus {
            border-color: var(--electric-yellow);
        }

    </style>
</head>
<body>

<div class="app-container">

    <div id="home-screen" class="screen active">
        <svg class="thunder-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" />
        </svg>

        <h1>THUNDER<br>FINDER</h1>
        <p class="home-subtitle">
            Distance calculation via visual and acoustic discrepancy analysis. Use at your own risk.
        </p>
        
        <div class="btn-container">
            <button class="btn btn-primary" onclick="nav('tracker-screen'); initSensors();">Start Finding</button>
            <button class="btn" onclick="nav('settings-screen')">Settings</button>
            <a href="https://buymeacoffee.com/josjosjos" target="_blank" class="btn" style="border-color: var(--electric-yellow); color: var(--electric-yellow);">Donate (Coffee)</a>
        </div>
    </div>

    <div id="settings-screen" class="screen">
        <div class="header-bar">
            <h2>Settings</h2>
            <button onclick="nav('home-screen')" style="background:none; border:none; color:var(--text-light); font-weight:bold; font-size:1.2rem; cursor:pointer;">[X]</button>
        </div>

        <div class="setting-group">
            <label>Hardware Selection</label>
            <select id="camera-select" class="brutalist-select" style="margin-bottom: 10px;">
                <option value="">Default/Auto Camera</option>
            </select>
            <select id="mic-select" class="brutalist-select">
                <option value="">Default/Auto Mic</option>
            </select>
            <button class="btn btn-small" style="margin-top: 10px; width: 100%;" onclick="populateDevices()">Scan Devices</button>
        </div>

        <div class="setting-group">
            <label>Mic Sensitivity <span id="mic-val" class="val-display">25</span></label>
            <input type="range" id="mic-slider" min="1" max="100" value="25" oninput="document.getElementById('mic-val').innerText = this.value">
            <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 5px;">Suggest 20-25. Adjust based on environment.</p>
        </div>

        <div class="setting-group">
            <label>Flash Threshold <span id="flash-val" class="val-display">50</span></label>
            <input type="range" id="flash-slider" min="10" max="150" value="50" oninput="document.getElementById('flash-val').innerText = this.value">
        </div>

        <div class="btn-container" style="margin-top: auto; padding-top: 20px;">
            <button class="btn btn-primary" onclick="nav('home-screen')">Save & Exit</button>
        </div>
    </div>

    <div id="tracker-screen" class="screen">
        <div class="header-bar">
            <h2>SYS. ACTIVE</h2>
            <button onclick="stopSensors(); nav('home-screen');" style="background:none; border:none; color:var(--danger-red); font-weight:bold; cursor:pointer;">[ABORT]</button>
        </div>

        <div class="camera-container">
            <video id="camera-feed" autoplay playsinline></video>
            <canvas id="canvas-feed" style="display:none;"></canvas>
            <div class="flash-overlay" id="flash-fx"></div>
            <div class="overlay-text">CAM-01 OP.</div>
            <div id="status-indicator">WAITING FOR FLASH...</div>
        </div>

        <div class="mic-container">
            <div style="font-size: 0.8rem; margin-bottom: 5px;">MIC VOL // <span id="live-vol">0.00</span></div>
            <div class="mic-bar-wrapper">
                <div id="mic-bar"></div>
                <div id="mic-threshold-line" style="left: 25%;"></div>
            </div>
        </div>

        <div id="results-container">
            <div style="border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 5px;">
                T-ELAPSED: <span id="res-time" style="color: var(--electric-yellow)">0</span> ms
            </div>
            <div id="res-dist" style="font-size: 0.85rem; line-height: 1.5; color: var(--text-dim);">
                </div>
            <div id="res-warning" class="warning-text"></div>
            <button class="btn" style="margin-top: 15px; padding: 10px; font-size: 1rem; width:100%; max-width:none;" onclick="resetTracker()">Restart</button>
        </div>
    </div>

</div>

    <script>
        // State Machine
        let STATE = 'IDLE'; // IDLE, WAIT_FLASH, WAIT_THUNDER, RESULT
        let flashTime = 0;
        let prevBrightness = null;
        let animationFrameId = null;
        let devicesPopulated = false;

        // Hardware streams
        let videoStream = null;
        let audioContext = null;
        let analyser = null;
        let microphone = null;

        // UI Elements
        const videoElement = document.getElementById('camera-feed');
        const canvasElement = document.getElementById('canvas-feed');
        const ctx = canvasElement.getContext('2d', { willReadFrequently: true });
        const statusIndicator = document.getElementById('status-indicator');
        const micBar = document.getElementById('mic-bar');
        const liveVolTxt = document.getElementById('live-vol');
        const flashFx = document.getElementById('flash-fx');
        const resultsContainer = document.getElementById('results-container');
        
        // Settings Elements
        const camSelect = document.getElementById('camera-select');
        const micSelect = document.getElementById('mic-select');
        const getMicThreshold = () => parseInt(document.getElementById('mic-slider').value);
        const getFlashThreshold = () => parseInt(document.getElementById('flash-slider').value);

        // Navigation
        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if(screenId === 'tracker-screen') {
                document.getElementById('mic-threshold-line').style.left = getMicThreshold() + '%';
            }
            if(screenId === 'settings-screen' && !devicesPopulated) {
                populateDevices();
            }
        }

        // Hardware Device Enumeration
        async function populateDevices() {
            try {
                // Single combined call to get permission for both audio and video
                const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                tempStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                
                // Clear existing options except default
                camSelect.innerHTML = '<option value="">Default/Auto Camera</option>';
                micSelect.innerHTML = '<option value="">Default/Auto Mic</option>';

                devices.forEach(device => {
                    if (device.kind === 'videoinput') {
                        const option = document.createElement('option');
                        option.value = device.deviceId;
                        option.text = device.label || `Camera ${camSelect.length}`;
                        camSelect.appendChild(option);
                    } else if (device.kind === 'audioinput') {
                        const option = document.createElement('option');
                        option.value = device.deviceId;
                        option.text = device.label || `Microphone ${micSelect.length}`;
                        micSelect.appendChild(option);
                    }
                });
                
                devicesPopulated = true;
            } catch (err) {
                console.warn("Could not enumerate devices automatically. Permissions may be blocked.", err);
            }
        }

        async function initSensors() {
            STATE = 'WAIT_FLASH';
            statusIndicator.innerText = "WAITING FOR FLASH...";
            statusIndicator.style.color = "var(--text-light)";
            resultsContainer.classList.remove('active');
            prevBrightness = null;

            try {
                const selectedCamId = camSelect.value;
                const selectedMicId = micSelect.value;

                const videoConstraints = selectedCamId
                    ? { deviceId: { exact: selectedCamId } }
                    : { facingMode: 'environment' };

                const audioConstraints = selectedMicId
                    ? { deviceId: { exact: selectedMicId } }
                    : true;

                // Single combined call — Android/Capacitor rejects two separate calls
                const combinedStream = await navigator.mediaDevices.getUserMedia({
                    video: videoConstraints,
                    audio: audioConstraints
                });

                // Split the combined stream into video and audio tracks
                const videoTracks = combinedStream.getVideoTracks();
                const audioTracks = combinedStream.getAudioTracks();

                // Attach video to element
                videoStream = new MediaStream(videoTracks);
                videoElement.srcObject = videoStream;

                // Hook audio tracks into analyser
                const audioStream = new MediaStream(audioTracks);
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                microphone = audioContext.createMediaStreamSource(audioStream);
                microphone.connect(analyser);

                // Start loop
                processFrames();

            } catch (err) {
                let msg = "Hardware access denied or unavailable.\n\nError: " + err.message;
                if (err.name === 'NotAllowedError') {
                    msg = "Camera & microphone permission was denied.\n\nPlease go to your phone Settings > Apps > ThunderFinder > Permissions and enable Camera and Microphone.";
                } else if (err.name === 'NotFoundError') {
                    msg = "No camera or microphone found on this device.";
                } else if (err.name === 'NotReadableError') {
                    msg = "Camera or microphone is already in use by another app. Close other apps and try again.";
                }
                alert(msg);
                nav('home-screen');
            }
        }

        function stopSensors() {
            STATE = 'IDLE';
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (videoStream) videoStream.getTracks().forEach(track => track.stop());
            if (audioContext) audioContext.close();
        }

        function resetTracker() {
            resultsContainer.classList.remove('active');
            STATE = 'WAIT_FLASH';
            statusIndicator.innerText = "WAITING FOR FLASH...";
            statusIndicator.style.color = "var(--text-light)";
            prevBrightness = null;
        }

        function processFrames() {
            if (STATE === 'IDLE') return;

            // 1. Process Audio Visualizer (Always running when active)
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            
            // Calculate average volume map to 0-100 range roughly
            let sum = 0;
            for(let i = 0; i < dataArray.length; i++) { sum += dataArray[i]; }
            let averageVol = sum / dataArray.length;
            let normalizedVol = Math.min((averageVol / 128) * 100, 100); 

            micBar.style.width = normalizedVol + '%';
            liveVolTxt.innerText = normalizedVol.toFixed(1);

            // 2. State Logic
            if (STATE === 'WAIT_FLASH') {
                detectFlash();
            } else if (STATE === 'WAIT_THUNDER') {
                detectThunder(normalizedVol);
            }

            animationFrameId = requestAnimationFrame(processFrames);
        }

        function detectFlash() {
            if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                canvasElement.width = videoElement.videoWidth / 4; // Scale down for perf
                canvasElement.height = videoElement.videoHeight / 4;
                ctx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
                
                let imageData = ctx.getImageData(0, 0, canvasElement.width, canvasElement.height);
                let data = imageData.data;
                
                let brightnessSum = 0;
                for(let i = 0; i < data.length; i += 4) {
                    // Grayscale conversion
                    brightnessSum += (0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]);
                }
                let currBrightness = brightnessSum / (data.length / 4);

                if (prevBrightness !== null) {
                    if (currBrightness - prevBrightness > getFlashThreshold()) {
                        triggerFlashDetect();
                    }
                }
                prevBrightness = currBrightness;
            }
        }

        function triggerFlashDetect() {
            STATE = 'WAIT_THUNDER';
            flashTime = performance.now();
            
            // Visual feedback
            flashFx.classList.add('is-flashing');
            setTimeout(() => flashFx.classList.remove('is-flashing'), 500);

            statusIndicator.innerText = "LISTENING FOR THUNDER...";
            statusIndicator.style.color = "var(--electric-yellow)";
            
            // Set max wait time (15 seconds)
            setTimeout(() => {
                if (STATE === 'WAIT_THUNDER') {
                    statusIndicator.innerText = "TIMEOUT. NO THUNDER.";
                    setTimeout(resetTracker, 3000);
                }
            }, 15000);
        }

        function detectThunder(vol) {
            if (vol > getMicThreshold()) {
                let thunderTime = performance.now();
                let elapsedMs = thunderTime - flashTime;
                calculateAndShowDistance(elapsedMs);
            }
        }

        function calculateAndShowDistance(elapsedMs) {
            STATE = 'RESULT';
            statusIndicator.innerText = "CALCULATION COMPLETE";
            statusIndicator.style.color = "var(--safe-green)";

            let distanceMeters = 343 * (elapsedMs / 1000);
            
            document.getElementById('res-time').innerText = Math.round(elapsedMs);
            
            let htmlDist = `
                KM: ${(distanceMeters / 1000).toFixed(2)}<br>
                MI: ${(distanceMeters / 1609.34).toFixed(2)}<br>
                FT: ${(distanceMeters / 0.3048).toFixed(2)}<br>
                M : ${distanceMeters.toFixed(2)}<br>
                YD: ${(distanceMeters / 0.9144).toFixed(2)}
            `;
            document.getElementById('res-dist').innerHTML = htmlDist;

            let warning = "";
            if (elapsedMs < 1500) warning = "SEEK SHELTER IMMEDIATELY! VERY CLOSE!";
            else if (elapsedMs >= 1500 && elapsedMs < 2500) warning = "VERY CLOSE! DO NOT BE OUTSIDE!";
            else if (elapsedMs >= 2500 && elapsedMs < 3500) warning = "CLOSE. GET INSIDE FAST!";
            else if (elapsedMs >= 3500 && elapsedMs < 4500) warning = "GETTING CLOSER. GET INSIDE.";
            else if (elapsedMs >= 4500 && elapsedMs < 6000) warning = "GET INSIDE SOON. AVOID OPEN AREAS.";
            else if (elapsedMs >= 6000 && elapsedMs < 9000) warning = "LEAVE OPEN AREAS. FIND DRY SAFETY.";
            else if (elapsedMs >= 9000 && elapsedMs < 14000) warning = "SAFE FOR NOW. SLOWLY LEAVE OPEN AREAS.";
            else if (elapsedMs >= 14000 && elapsedMs < 19000) warning = "OK TO BE OUTSIDE. MONITOR CONDITIONS.";
            else if (elapsedMs >= 19000) warning = "YOU'RE FINE. KEEP CHECKING.";

            document.getElementById('res-warning').innerText = warning;
            
            // Adjust warning color based on severity
            if (elapsedMs < 6000) {
                document.getElementById('res-warning').style.color = "var(--danger-red)";
            } else if (elapsedMs < 14000) {
                document.getElementById('res-warning').style.color = "var(--electric-yellow)";
            } else {
                document.getElementById('res-warning').style.color = "var(--safe-green)";
            }

            resultsContainer.classList.add('active');
        }
    </script>
</body>
</html>
